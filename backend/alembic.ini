# Alembic Configuration

[alembic]
# Path to migration scripts
script_location = alembic

# SQLAlchemy URL — Alembic uses SYNC driver (psycopg2), not async
# Override with ALEMBIC_DATABASE_URL env var if needed
sqlalchemy.url = postgresql://smarttender:smarttender_dev@postgres:5432/smarttender

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
