# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  SmartTender AI — Docker Compose (AWS Deployment)                         ║
# ║                                                                         ║
# ║  ARCHITECTURE:                                                           ║
# ║  - PostgreSQL, Redis, Qdrant, Docling, FastAPI, React: EC2 instance     ║
# ║  - Docker Model Runner: Native Docker daemon on EC2                      ║
# ║  - n8n: Cloud-hosted (https://n8n.io/cloud)                              ║
# ║                                                                         ║
# ║  BEFORE FIRST RUN (EC2 setup):                                           ║
# ║  1. SSH into EC2, install Docker & Docker Compose                        ║
# ║  2. Pull AI models (runs once):                                          ║
# ║       docker model pull ai/mistral-7b-instruct-q4   (~4.1 GB)           ║
# ║       docker model pull ai/nomic-embed-text          (~275 MB)           ║
# ║       docker model pull ai/llava-7b                  (~4.5 GB)           ║
# ║  3. Set environment variables in .env (see .env.example)                 ║
# ║  4. Run: docker compose up -d                                            ║
# ║                                                                         ║
# ║  CONFIGURE n8n Cloud:                                                    ║
# ║  1. Create account at https://n8n.io/cloud                               ║
# ║  2. Create workflows matching your local workflow IDs                    ║
# ║  3. Set N8N_WEBHOOK_BASE_URL in .env to your cloud instance URL          ║
# ║     Example: https://your-username.n8n.cloud/webhook                     ║
# ║                                                                         ║
# ║  MODEL RUNNER ON EC2:                                                    ║
# ║  - Available at: http://localhost:11434/v1/models (local)                ║
# ║  - From containers: http://host.docker.internal/v1/models                ║
# ║  - MODEL_RUNNER_BASE_URL is accessible from all containers               ║
# ╚══════════════════════════════════════════════════════════════════════════╝

services:
  # ────────────────────────────────────────────
  # PostgreSQL — append-only audit database
  # ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smarttender}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smarttender_dev}
      POSTGRES_DB: ${POSTGRES_DB:-smarttender}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smarttender} -d ${POSTGRES_DB:-smarttender}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ────────────────────────────────────────────
  # Redis — caching, rate limiting
  # ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ────────────────────────────────────────────
  # Qdrant — vector store for document embeddings
  # ────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.12.5
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrantdata:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "cat < /dev/null > /dev/tcp/127.0.0.1/6333"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ────────────────────────────────────────────
  # Docling — OCR microservice (PDF/image → text)
  # ────────────────────────────────────────────
  docling:
    build:
      context: ./docling
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${DOCLING_PORT:-8001}:8001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 30s  # Docling loads ML models on startup — give it time

  # ────────────────────────────────────────────
  # Ollama — Local Embedding Model Runner
  # Hosts nomic-embed-text:v1.5 for fast local vectors
  # ────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollamadata:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ────────────────────────────────────────────
  # Ollama Puller — Auto-downloads the model
  # ────────────────────────────────────────────
  ollama-pull:
    image: curlimages/curl:latest
    container_name: smarttenderai-unnati-ollama-pull
    restart: "no"
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo "Waiting for Ollama to be ready..."
        while ! curl -s http://ollama:11434/api/tags >/dev/null; do
          sleep 2
        done
        echo "Pulling nomic-embed-text:v1.5 model..."
        curl -s -X POST http://ollama:11434/api/pull -d '{"name": "nomic-embed-text:v1.5"}'
        echo "Model pulled successfully."
    depends_on:
      ollama:
        condition: service_healthy

  # ────────────────────────────────────────────
  # n8n — AI workflow orchestrator
  # All AI logic lives here.
  # ────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:1.73.1
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_USER_FOLDER: /home/node/.n8n
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678}
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-smarttender_n8n}
      GENERIC_TIMEZONE: ${N8N_DEFAULT_TIMEZONE:-Asia/Kolkata}
      TZ: ${N8N_DEFAULT_TIMEZONE:-Asia/Kolkata}
      N8N_RESTRICT_ENVIRONMENT_VARIABLES: "false"
      NODE_FUNCTION_ALLOW_EXTERNAL: "*"
      N8N_SECURE_COOKIE: ${N8N_SECURE_COOKIE:-false}
    volumes:
      - n8ndata:/home/node/.n8n
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  # ────────────────────────────────────────────
  # n8n-import — One-time workflow importer
  # ────────────────────────────────────────────
  n8n-import:
    image: n8nio/n8n:1.73.1
    container_name: smarttenderai-unnati-n8n-import
    volumes:
      - n8ndata:/home/node/.n8n
      - ./n8n/workflows:/workflows:ro
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "Waiting for n8n to initialize..."
        sleep 5
        echo "Importing workflows from /workflows..."
        n8n import:workflow --separate --input=/workflows
        
        echo "Activating workflows..."
        n8n list:workflow | grep '|' | while read line; do
          id=$$(echo $$line | cut -d'|' -f1)
          echo "Activating workflow $$id..."
          n8n update:workflow --id=$$id --active=true
        done
        echo "Workflows imported and activated successfully."
    depends_on:
      n8n:
        condition: service_started

  # ────────────────────────────────────────────
  # FastAPI Backend — thin API layer, no AI logic
  # ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://smarttender:smarttender_dev@postgres:5432/smarttender}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      QDRANT_HOST: ${QDRANT_HOST:-qdrant}
      QDRANT_PORT: ${QDRANT_PORT:-6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-tender_docs}
      QDRANT_VECTOR_SIZE: ${QDRANT_VECTOR_SIZE:-768}
      MODEL_RUNNER_BASE_URL: ${MODEL_RUNNER_BASE_URL:-http://ollama:11434/v1}
      DOCLING_HOST: ${DOCLING_HOST:-docling}
      DOCLING_PORT: ${DOCLING_PORT:-8001}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
      REPORT_DIR: ${REPORT_DIR:-/app/reports}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      N8N_WEBHOOK_BASE_URL: ${N8N_WEBHOOK_BASE_URL:-http://n8n:5678/webhook}
    volumes:
      - uploads:/app/uploads
      - reports:/app/reports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  # ────────────────────────────────────────────
  # React Frontend — UI for tender evaluation
  # ────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
    restart: unless-stopped
    ports:
      - "5173:80"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
    depends_on:
      - backend

# ────────────────────────────────────────────
# Named Volumes
# ────────────────────────────────────────────
volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  qdrantdata:
    driver: local
  n8ndata:
    driver: local
  uploads:
    driver: local
  reports:
    driver: local
  ollamadata:
    driver: local
