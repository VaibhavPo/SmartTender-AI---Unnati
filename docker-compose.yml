# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  SmartTender AI — Docker Compose                                        ║
# ║                                                                         ║
# ║  PREREQUISITE: Docker Model Runner                                       ║
# ║  Before running `docker compose up`, you MUST:                           ║
# ║  1. Open Docker Desktop → Settings → Features in development            ║
# ║     → Enable "Docker Model Runner"                                       ║
# ║  2. Pull the required models (run ONCE):                                 ║
# ║       docker model pull ai/mistral-7b-instruct-q4   (~4.1 GB)           ║
# ║       docker model pull ai/nomic-embed-text          (~275 MB)           ║
# ║       docker model pull ai/llava-7b                  (~4.5 GB)           ║
# ║  3. Minimum RAM: 16 GB to run all three simultaneously.                  ║
# ║     If you have <16 GB, comment out MODEL_VISION in .env and skip       ║
# ║     the llava pull — the system will fall back to Docling-only OCR.      ║
# ║                                                                         ║
# ║  Docker Model Runner is NOT a compose service. It is a Docker Desktop   ║
# ║  daemon feature accessible from any container at:                        ║
# ║    http://model-runner.docker.internal/engines/llama.cpp/v1              ║
# ╚══════════════════════════════════════════════════════════════════════════╝

services:
  # ────────────────────────────────────────────
  # PostgreSQL — append-only audit database
  # ────────────────────────────────────────────
  postgres:
    image: postgres:latest
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smarttender}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smarttender_dev}
      POSTGRES_DB: ${POSTGRES_DB:-smarttender}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smarttender} -d ${POSTGRES_DB:-smarttender}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ────────────────────────────────────────────
  # Redis — caching, rate limiting, n8n queue
  # ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ────────────────────────────────────────────
  # Qdrant — vector store for document embeddings
  # ────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.12.5
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrantdata:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ────────────────────────────────────────────
  # Docling — OCR microservice (PDF/image → text)
  # ────────────────────────────────────────────
  docling:
    build:
      context: ./docling
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${DOCLING_PORT:-8001}:8001"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 30s  # Docling loads ML models on startup — give it time

  # ────────────────────────────────────────────
  # n8n — AI workflow orchestrator
  # All AI logic lives here. Calls Docker Model
  # Runner, Docling, Qdrant, and FastAPI via HTTP.
  # ────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:1.73.1
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # Persist workflows and credentials in the volume
      N8N_USER_FOLDER: /home/node/.n8n

      # Webhook URL — must be reachable from FastAPI container
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://n8n:5678}

      # Auth for web UI
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:-smarttender_n8n}

      # Timezone
      GENERIC_TIMEZONE: ${N8N_DEFAULT_TIMEZONE:-Asia/Kolkata}
      TZ: ${N8N_DEFAULT_TIMEZONE:-Asia/Kolkata}

      # Queue mode with Redis for better reliability
      EXECUTIONS_MODE: queue
      QUEUE_BULL_REDIS_HOST: redis
      QUEUE_BULL_REDIS_PORT: 6379

      # Allow calling internal Docker hostnames
      N8N_RESTRICT_ENVIRONMENT_VARIABLES: "false"
      NODE_FUNCTION_ALLOW_EXTERNAL: "*"
    volumes:
      - n8ndata:/home/node/.n8n
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  # ────────────────────────────────────────────
  # FastAPI Backend — thin API layer, no AI logic
  # ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://smarttender:smarttender_dev@postgres:5432/smarttender}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      QDRANT_HOST: ${QDRANT_HOST:-qdrant}
      QDRANT_PORT: ${QDRANT_PORT:-6333}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-tender_docs}
      QDRANT_VECTOR_SIZE: ${QDRANT_VECTOR_SIZE:-768}
      MODEL_RUNNER_BASE_URL: ${MODEL_RUNNER_BASE_URL:-http://model-runner.docker.internal/engines/llama.cpp/v1}
      DOCLING_HOST: ${DOCLING_HOST:-docling}
      DOCLING_PORT: ${DOCLING_PORT:-8001}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
      REPORT_DIR: ${REPORT_DIR:-/app/reports}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      N8N_WEBHOOK_BASE_URL: ${N8N_WEBHOOK_BASE_URL:-http://n8n:5678/webhook}
    volumes:
      - uploads:/app/uploads
      - reports:/app/reports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

# ────────────────────────────────────────────
# Named Volumes
# ────────────────────────────────────────────
volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  qdrantdata:
    driver: local
  n8ndata:
    driver: local
  uploads:
    driver: local
  reports:
    driver: local
